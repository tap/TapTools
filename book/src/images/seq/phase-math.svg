<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" font-family="sans-serif" font-size="12.5">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#666666"/>
    </marker>
  </defs>

  <text x="16" y="24" fill="#1a1a1a" font-weight="bold">time as a function of phase — no clock, no state, no drift</text>

  <!-- phase ramp glyph -->
  <g stroke="#4269d0" stroke-width="2" fill="none">
    <path d="M 20 120 L 80 60 M 80 120 L 140 60 M 140 120 L 200 60"/>
  </g>
  <line x1="20" y1="120" x2="205" y2="120" stroke="#cccccc" stroke-width="1"/>
  <text x="112" y="140" text-anchor="middle" fill="#4269d0" font-size="11.5">one phase ramp, [0,1) per cycle</text>

  <line x1="212" y1="90" x2="240" y2="90" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="242" y="60" width="150" height="60" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="317" y="82" text-anchor="middle" fill="#1a1a1a">k = ⌊φ · length⌋</text>
  <text x="317" y="99" text-anchor="middle" fill="#666666" font-size="9.5">step derived, not counted;</text>
  <text x="317" y="112" text-anchor="middle" fill="#666666" font-size="9.5">swing warps odd boundaries</text>
  <line x1="392" y1="90" x2="420" y2="90" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="422" y="60" width="146" height="60" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="495" y="86" text-anchor="middle" fill="#1a1a1a">k ≠ k_prev ?</text>
  <text x="495" y="103" text-anchor="middle" fill="#666666" font-size="9.5">step entry — the only memory</text>

  <line x1="568" y1="78" x2="592" y2="60" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="568" y1="102" x2="592" y2="120" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="594" y="34" width="180" height="46" rx="4" fill="none" stroke="#b8890f" stroke-width="1.6"/>
  <text x="684" y="53" text-anchor="middle" fill="#b8890f">trigger-row emitter</text>
  <text x="684" y="70" text-anchor="middle" fill="#666666" font-size="9.5">pulse_ms · accent level 0.01/0.5/1.0</text>
  <rect x="594" y="102" width="180" height="46" rx="4" fill="none" stroke="#b8890f" stroke-width="1.6"/>
  <text x="684" y="121" text-anchor="middle" fill="#b8890f">note-row emitter</text>
  <text x="684" y="138" text-anchor="middle" fill="#666666" font-size="9.5">pitch · gate (closes at 0.5) · slide hold</text>

  <!-- polymeter panel -->
  <text x="16" y="192" fill="#1a1a1a" font-size="11.5" font-weight="bold">polymeter as arithmetic — two lengths, one ramp, zero drift</text>
  <line x1="60" y1="216" x2="900" y2="216" stroke="#666666" stroke-width="1.2"/>
  <text x="16" y="220" fill="#666666" font-size="10.5">len 16</text>
  <g stroke="#4269d0" stroke-width="1.4">
    <line x1="60" y1="210" x2="60" y2="222"/><line x1="112.5" y1="210" x2="112.5" y2="222"/><line x1="165" y1="210" x2="165" y2="222"/><line x1="217.5" y1="210" x2="217.5" y2="222"/>
    <line x1="270" y1="210" x2="270" y2="222"/><line x1="322.5" y1="210" x2="322.5" y2="222"/><line x1="375" y1="210" x2="375" y2="222"/><line x1="427.5" y1="210" x2="427.5" y2="222"/>
    <line x1="480" y1="210" x2="480" y2="222"/><line x1="532.5" y1="210" x2="532.5" y2="222"/><line x1="585" y1="210" x2="585" y2="222"/><line x1="637.5" y1="210" x2="637.5" y2="222"/>
    <line x1="690" y1="210" x2="690" y2="222"/><line x1="742.5" y1="210" x2="742.5" y2="222"/><line x1="795" y1="210" x2="795" y2="222"/><line x1="847.5" y1="210" x2="847.5" y2="222"/>
    <line x1="900" y1="208" x2="900" y2="224" stroke-width="2"/>
  </g>
  <line x1="60" y1="252" x2="900" y2="252" stroke="#666666" stroke-width="1.2"/>
  <text x="16" y="256" fill="#666666" font-size="10.5">len 12</text>
  <g stroke="#b8890f" stroke-width="1.4">
    <line x1="60" y1="246" x2="60" y2="258"/><line x1="130" y1="246" x2="130" y2="258"/><line x1="200" y1="246" x2="200" y2="258"/><line x1="270" y1="246" x2="270" y2="258"/>
    <line x1="340" y1="246" x2="340" y2="258"/><line x1="410" y1="246" x2="410" y2="258"/><line x1="480" y1="246" x2="480" y2="258"/><line x1="550" y1="246" x2="550" y2="258"/>
    <line x1="620" y1="246" x2="620" y2="258"/><line x1="690" y1="246" x2="690" y2="258"/><line x1="760" y1="246" x2="760" y2="258"/><line x1="830" y1="246" x2="830" y2="258"/>
    <line x1="900" y1="244" x2="900" y2="260" stroke-width="2"/>
  </g>
  <text x="60" y="280" fill="#666666" font-size="10.5">both rows read the same φ — boundaries at k/len, re-derived every sample. They cannot drift; they meet again at the wrap, exactly.</text>
</svg>
