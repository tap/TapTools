<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 330" font-family="sans-serif" font-size="12.5">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#666666"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#ff725c"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#b8890f"/>
    </marker>
  </defs>

  <text x="16" y="26" fill="#1a1a1a" font-weight="bold">the Moog ladder — four saturating one-poles inside one feedback loop</text>

  <!-- main path -->
  <text x="10" y="119" fill="#1a1a1a">x</text>
  <line x1="24" y1="115" x2="42" y2="115" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="44" y="98" width="62" height="34" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="75" y="119" text-anchor="middle" fill="#1a1a1a">× drive</text>
  <line x1="106" y1="115" x2="126" y2="115" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <circle cx="144" cy="115" r="15" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="144" y="120" text-anchor="middle" fill="#1a1a1a" font-size="15">Σ</text>
  <text x="131" y="103" fill="#666666" font-size="11">+</text>
  <text x="134" y="141" fill="#ff725c" font-size="11">−</text>

  <line x1="159" y1="115" x2="182" y2="115" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="184" y="94" width="86" height="42" rx="4" fill="none" stroke="#4269d0" stroke-width="2"/>
  <text x="227" y="119" text-anchor="middle" fill="#4269d0">tanh → G₁</text>
  <line x1="270" y1="115" x2="312" y2="115" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="314" y="94" width="86" height="42" rx="4" fill="none" stroke="#4269d0" stroke-width="2"/>
  <text x="357" y="119" text-anchor="middle" fill="#4269d0">tanh → G₂</text>
  <line x1="400" y1="115" x2="422" y2="115" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="424" y="94" width="86" height="42" rx="4" fill="none" stroke="#4269d0" stroke-width="2"/>
  <text x="467" y="119" text-anchor="middle" fill="#4269d0">tanh → G₃</text>
  <line x1="510" y1="115" x2="532" y2="115" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="534" y="94" width="86" height="42" rx="4" fill="none" stroke="#4269d0" stroke-width="2"/>
  <text x="577" y="119" text-anchor="middle" fill="#4269d0">tanh → G₄</text>
  <line x1="620" y1="115" x2="648" y2="115" stroke="#666666" stroke-width="1.6"/>
  <circle cx="652" cy="115" r="3.5" fill="#666666"/>
  <text x="652" y="103" text-anchor="middle" fill="#666666" font-size="11">y₄</text>
  <line x1="655" y1="115" x2="686" y2="115" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- pole mix -->
  <rect x="676" y="94" width="152" height="42" rx="4" fill="none" stroke="#b8890f" stroke-width="1.6"/>
  <text x="753" y="111" text-anchor="middle" fill="#b8890f">pole mix</text>
  <text x="753" y="128" text-anchor="middle" fill="#666666" font-size="10.5">Xpander modes, taps y₀…y₄</text>
  <line x1="828" y1="115" x2="850" y2="115" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="856" y="119" fill="#1a1a1a">y</text>
  <path d="M 237 136 L 237 158 L 700 158 L 700 138" fill="none" stroke="#b8890f" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M 357 136 L 357 158" fill="none" stroke="#b8890f" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M 467 136 L 467 158" fill="none" stroke="#b8890f" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="380" y="172" fill="#b8890f" font-size="10.5">per-stage taps: lp24, lp12, bp, hp — the Xpander trick</text>

  <!-- feedback -->
  <path d="M 652 119 L 652 208 L 396 208" fill="none" stroke="#ff725c" stroke-width="1.8" marker-end="url(#ar)"/>
  <rect x="290" y="191" width="106" height="34" rx="4" fill="none" stroke="#ff725c" stroke-width="1.6"/>
  <text x="343" y="206" text-anchor="middle" fill="#ff725c">× k = 4·res</text>
  <text x="343" y="219" text-anchor="middle" fill="#666666" font-size="10.5">k = 4: oscillation</text>
  <path d="M 290 208 L 144 208 L 144 130" fill="none" stroke="#ff725c" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="340" y="248" fill="#ff725c" font-size="11">at fc each stage is −45° and gain 1/√2: four give −180° and ¼, so k = 4·resonance</text>
  <text x="340" y="262" fill="#666666" font-size="11">puts the oscillation threshold exactly at resonance 1. Each stage is a one-pole with</text>
  <text x="340" y="276" fill="#666666" font-size="11">g = tan(πfc/fs), and the loop is solved zero-delay (predict linear, saturate, commit).</text>

  <!-- comp path -->
  <path d="M 33 115 L 33 300 L 108 300" fill="none" stroke="#b8890f" stroke-width="1.8"/>
  <rect x="110" y="283" width="120" height="34" rx="4" fill="none" stroke="#b8890f" stroke-width="1.6"/>
  <text x="170" y="298" text-anchor="middle" fill="#b8890f">+ comp · k · x</text>
  <text x="170" y="311" text-anchor="middle" fill="#666666" font-size="9.5">recovers the eaten passband</text>
  <path d="M 230 300 L 262 300" fill="none" stroke="#b8890f" stroke-width="1.8" marker-end="url(#ab)"/>
  <text x="268" y="304" fill="#b8890f" font-size="11">→ into the Σ: resonance stops costing bass</text>
</svg>
