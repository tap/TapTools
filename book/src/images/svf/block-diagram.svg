<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" font-family="sans-serif" font-size="12.5">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#666666"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#ff725c"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#b8890f"/>
    </marker>
  </defs>

  <text x="16" y="26" fill="#1a1a1a" font-weight="bold">the TPT state-variable core — two integrators, one zero-delay loop, every response downstream</text>

  <!-- main loop -->
  <text x="10" y="114" fill="#1a1a1a">v₀</text>
  <line x1="30" y1="110" x2="54" y2="110" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <circle cx="72" cy="110" r="15" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="72" y="115" text-anchor="middle" fill="#1a1a1a" font-size="15">Σ</text>
  <text x="58" y="98" fill="#666666" font-size="11">+</text>
  <text x="60" y="136" fill="#ff725c" font-size="11">−</text>
  <line x1="87" y1="110" x2="118" y2="110" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="102" y="100" text-anchor="middle" fill="#666666" font-size="10.5">hp</text>
  <rect x="120" y="88" width="120" height="44" rx="4" fill="none" stroke="#4269d0" stroke-width="2"/>
  <text x="180" y="106" text-anchor="middle" fill="#4269d0" font-size="15">∫</text>
  <text x="180" y="124" text-anchor="middle" fill="#666666" font-size="9.5">trapezoidal, g = tan(πfc/fs)</text>
  <line x1="240" y1="110" x2="272" y2="110" stroke="#666666" stroke-width="1.6"/>
  <circle cx="276" cy="110" r="3.5" fill="#666666"/>
  <text x="276" y="98" text-anchor="middle" fill="#666666" font-size="11">v₁ (band)</text>
  <line x1="279" y1="110" x2="310" y2="110" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="312" y="88" width="120" height="44" rx="4" fill="none" stroke="#4269d0" stroke-width="2"/>
  <text x="372" y="106" text-anchor="middle" fill="#4269d0" font-size="15">∫</text>
  <text x="372" y="124" text-anchor="middle" fill="#666666" font-size="9.5">ic1/ic2 equivalent currents</text>
  <line x1="432" y1="110" x2="464" y2="110" stroke="#666666" stroke-width="1.6"/>
  <circle cx="468" cy="110" r="3.5" fill="#666666"/>
  <text x="468" y="98" text-anchor="middle" fill="#666666" font-size="11">v₂ (low)</text>
  <line x1="471" y1="110" x2="502" y2="110" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- feedback paths -->
  <path d="M 276 114 L 276 168 L 150 168" fill="none" stroke="#ff725c" stroke-width="1.8"/>
  <rect x="94" y="151" width="56 " height="34" rx="4" fill="none" stroke="#ff725c" stroke-width="1.6"/>
  <text x="122" y="172" text-anchor="middle" fill="#ff725c">× k</text>
  <path d="M 94 168 L 72 168 L 72 125" fill="none" stroke="#ff725c" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="160" y="182" fill="#ff725c" font-size="10.5">damping (k = 1/Q)</text>
  <path d="M 468 114 L 468 200 L 72 200 L 72 125" fill="none" stroke="#ff725c" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="240" y="214" fill="#ff725c" font-size="10.5">the algebraic loop — solved per sample, no unit delay anywhere in it</text>

  <!-- output mix -->
  <rect x="530" y="70" width="180" height="80" rx="4" fill="none" stroke="#b8890f" stroke-width="2"/>
  <text x="620" y="94" text-anchor="middle" fill="#b8890f">output mix</text>
  <text x="620" y="112" text-anchor="middle" fill="#1a1a1a" font-size="11.5">m₀·v₀′ + m₁·v₁ + m₂·v₂</text>
  <text x="620" y="130" text-anchor="middle" fill="#666666" font-size="10.5">LP/HP/BP/notch/peak/allpass,</text>
  <text x="620" y="143" text-anchor="middle" fill="#666666" font-size="9.5">bell + shelves, and the morph circle</text>
  <line x1="710" y1="110" x2="726" y2="110" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="730" y="114" fill="#1a1a1a">y</text>

  <text x="758" y="80" fill="#1a1a1a" font-size="11.5">every response is three multiplies</text>
  <text x="758" y="96" fill="#666666" font-size="11">downstream of the same two states —</text>
  <text x="758" y="110" fill="#666666" font-size="11">which is why morph corners are</text>
  <text x="758" y="124" fill="#666666" font-size="11">bit-identical to the discrete modes,</text>
  <text x="758" y="138" fill="#666666" font-size="11">and why the driven circuit only has</text>
  <text x="758" y="152" fill="#666666" font-size="11">to tanh one node (the band).</text>

  <text x="16" y="240" fill="#666666" font-size="11">A-stable by construction: modulate fc every sample and the loop re-solves — no delay to blow the fuse the Chamberlin SVF carries.</text>
</svg>
