<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 250" font-family="sans-serif" font-size="12.5">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#666666"/>
    </marker>
  </defs>

  <text x="16" y="24" fill="#1a1a1a" font-weight="bold">the STFT scaffold (stft.h) — one pump, pluggable spectral ops</text>

  <!-- pipeline -->
  <text x="10" y="104" fill="#1a1a1a">in</text>
  <line x1="28" y1="100" x2="48" y2="100" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="50" y="78" width="96" height="44" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="98" y="96" text-anchor="middle" fill="#1a1a1a">input ring</text>
  <text x="98" y="113" text-anchor="middle" fill="#666666" font-size="10.5">hop = N/4</text>
  <line x1="146" y1="100" x2="166" y2="100" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="168" y="78" width="104" height="44" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="220" y="96" text-anchor="middle" fill="#1a1a1a">× Hann</text>
  <text x="220" y="113" text-anchor="middle" fill="#666666" font-size="10.5">analysis window</text>
  <line x1="272" y1="100" x2="292" y2="100" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="294" y="83" width="56" height="34" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="322" y="104" text-anchor="middle" fill="#1a1a1a">FFT</text>
  <line x1="350" y1="100" x2="370" y2="100" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="372" y="70" width="190" height="60" rx="4" fill="none" stroke="#4269d0" stroke-width="2"/>
  <text x="467" y="90" text-anchor="middle" fill="#4269d0">spectral op(re, im, N)</text>
  <text x="467" y="107" text-anchor="middle" fill="#666666" font-size="9.5">nr: per-bin downward expander</text>
  <text x="467" y="121" text-anchor="middle" fill="#666666" font-size="9.5">spectra: bin remap + Hermitian mirror</text>
  <line x1="562" y1="100" x2="582" y2="100" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="584" y="83" width="60" height="34" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="614" y="104" text-anchor="middle" fill="#1a1a1a">IFFT</text>
  <line x1="644" y1="100" x2="664" y2="100" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="666" y="78" width="104" height="44" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="718" y="96" text-anchor="middle" fill="#1a1a1a">× Hann</text>
  <text x="718" y="113" text-anchor="middle" fill="#666666" font-size="10.5">synthesis window</text>
  <line x1="770" y1="100" x2="790" y2="100" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="792" y="78" width="110" height="44" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="847" y="96" text-anchor="middle" fill="#1a1a1a">overlap-add</text>
  <text x="847" y="113" text-anchor="middle" fill="#666666" font-size="10.5">÷ 3/2 (COLA)</text>
  <line x1="902" y1="100" x2="922" y2="100" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="928" y="104" fill="#1a1a1a">out</text>

  <!-- annotations -->
  <text x="16" y="164" fill="#1a1a1a" font-size="11.5">The window is applied twice (analysis and synthesis), so smoothing covers both the op's</text>
  <text x="16" y="179" fill="#666666" font-size="11">discontinuities and the frame seams; four shifted Hann² windows at hop N/4 sum to exactly 3/2 at</text>
  <text x="16" y="193" fill="#666666" font-size="11">every sample — divide once and, with the op at identity, the output reconstructs the input below 10⁻⁶.</text>
  <text x="16" y="216" fill="#1a1a1a" font-size="11.5">Latency is exactly N samples, independent of the op — verified by the impulse test both effects share.</text>
  <text x="16" y="238" fill="#666666" font-size="11">tap.nr~ and tap.spectra~ are this one scaffold with different middles: the pump is shared, certified machinery.</text>
</svg>
