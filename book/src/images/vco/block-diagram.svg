<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" font-family="sans-serif" font-size="12.5">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#666666"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#ff725c"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#b8890f"/>
    </marker>
  </defs>

  <text x="16" y="26" fill="#1a1a1a" font-weight="bold">one master phase, many readings</text>

  <!-- frequency sum -->
  <text x="10" y="104" fill="#1a1a1a">pitch</text>
  <line x1="48" y1="100" x2="72" y2="100" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="10" y="130" fill="#666666" font-size="11.5">FM (thru-zero)</text>
  <line x1="96" y1="126" x2="112" y2="112" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="10" y="156" fill="#ff725c" font-size="11.5">drift · jitter · track · detune</text>
  <text x="10" y="170" fill="#666666" font-size="10.5">the analog section — per-seed, 0 by default</text>
  <line x1="146" y1="148" x2="118" y2="118" stroke="#ff725c" stroke-width="1.6" marker-end="url(#ar)"/>
  <circle cx="118" cy="100" r="15" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="118" y="105" text-anchor="middle" fill="#1a1a1a" font-size="15">Σ</text>
  <line x1="133" y1="100" x2="162" y2="100" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="148" y="90" text-anchor="middle" fill="#666666" font-size="10.5">f</text>

  <!-- phase accumulator -->
  <rect x="164" y="76" width="140" height="48" rx="4" fill="none" stroke="#4269d0" stroke-width="2"/>
  <text x="234" y="96" text-anchor="middle" fill="#4269d0">phase accumulator</text>
  <text x="234" y="113" text-anchor="middle" fill="#666666" font-size="10.5">φ += f/fs, wraps in [0,1)</text>
  <text x="234" y="150" text-anchor="middle" fill="#666666" font-size="11">sync resets φ (one-sided BLEP)</text>
  <line x1="234" y1="143" x2="234" y2="127" stroke="#666666" stroke-width="1.4" marker-end="url(#a)"/>

  <!-- fan to readers -->
  <line x1="304" y1="100" x2="336" y2="100" stroke="#666666" stroke-width="1.6"/>
  <circle cx="340" cy="100" r="3.5" fill="#666666"/>
  <path d="M 340 100 L 384 52" fill="none" stroke="#666666" stroke-width="1.4" marker-end="url(#a)"/>
  <path d="M 340 100 L 384 90" fill="none" stroke="#666666" stroke-width="1.4" marker-end="url(#a)"/>
  <path d="M 340 100 L 384 130" fill="none" stroke="#666666" stroke-width="1.4" marker-end="url(#a)"/>
  <path d="M 340 100 L 384 170" fill="none" stroke="#666666" stroke-width="1.4" marker-end="url(#a)"/>

  <rect x="386" y="34" width="188" height="32" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="480" y="54" text-anchor="middle" fill="#1a1a1a">sin: sin(2πφ)</text>
  <rect x="386" y="74" width="188" height="32" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="480" y="94" text-anchor="middle" fill="#1a1a1a">saw: 2φ−1 <tspan fill="#4269d0">+ polyBLEP</tspan></text>
  <rect x="386" y="114" width="188" height="32" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="480" y="134" text-anchor="middle" fill="#1a1a1a">pulse: φ&gt;pw  <tspan fill="#4269d0">+ 2× polyBLEP</tspan></text>
  <rect x="386" y="154" width="188" height="32" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="480" y="169" text-anchor="middle" fill="#1a1a1a">triangle: leaky ∫ of pulse</text>
  <text x="480" y="182" text-anchor="middle" fill="#666666" font-size="10">imperfect: even harmonics rise</text>

  <!-- imperfect injection -->
  <path d="M 320 196 L 384 176" fill="none" stroke="#ff725c" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="188" y="202" fill="#ff725c" font-size="11.5">imperfect (per-seed shaper skew)</text>

  <!-- crossfade -->
  <line x1="574" y1="50" x2="612" y2="96" stroke="#666666" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="574" y1="90" x2="608" y2="104" stroke="#666666" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="574" y1="130" x2="608" y2="116" stroke="#666666" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="574" y1="170" x2="612" y2="124" stroke="#666666" stroke-width="1.4" marker-end="url(#a)"/>
  <rect x="614" y="86" width="130" height="44" rx="4" fill="none" stroke="#b8890f" stroke-width="2"/>
  <text x="679" y="104" text-anchor="middle" fill="#b8890f">shape crossfade</text>
  <text x="679" y="121" text-anchor="middle" fill="#666666" font-size="10.5">sin → saw → pulse → tri</text>
  <line x1="744" y1="108" x2="772" y2="108" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="778" y="112" fill="#1a1a1a">y</text>

  <text x="614" y="160" fill="#1a1a1a" font-size="11.5">every waveform is a *reading* of the same φ —</text>
  <text x="614" y="176" fill="#666666" font-size="11">morphing never re-synchronizes anything, and the</text>
  <text x="614" y="190" fill="#666666" font-size="11">polyBLEP residual (±½ at the wrap) buys 47 dB of</text>
  <text x="614" y="204" fill="#666666" font-size="11">alias suppression over the naive readings.</text>

  <text x="16" y="248" fill="#666666" font-size="11">The analog section injects into two places only: the frequency sum (drift, jitter, track, detune) and the shapers (imperfect) —</text>
  <text x="16" y="263" fill="#666666" font-size="11">all deterministic per seed. A seed is a serial number; seed 0 is the ideal instrument.</text>
</svg>
