<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" font-family="sans-serif" font-size="12.5">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#666666"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#b8890f"/>
    </marker>
  </defs>

  <text x="16" y="24" fill="#1a1a1a" font-weight="bold">two identical banks and a multiplier — everything you hear is carrier</text>

  <!-- modulator branch -->
  <text x="10" y="86" fill="#1a1a1a">modulator</text>
  <line x1="80" y1="82" x2="112" y2="82" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="114" y="56" width="170" height="52" rx="4" fill="none" stroke="#4269d0" stroke-width="2"/>
  <text x="199" y="78" text-anchor="middle" fill="#4269d0">24-band BP bank</text>
  <text x="199" y="95" text-anchor="middle" fill="#666666" font-size="10.5">50 Hz → 12 kHz, log-spaced</text>
  <line x1="284" y1="82" x2="316" y2="82" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="318" y="56" width="176" height="52" rx="4" fill="none" stroke="#b8890f" stroke-width="1.6"/>
  <text x="406" y="78" text-anchor="middle" fill="#b8890f">24 envelope followers</text>
  <text x="406" y="95" text-anchor="middle" fill="#666666" font-size="9.5">rectify → one-pole (response_interval)</text>

  <!-- carrier branch -->
  <text x="10" y="206" fill="#1a1a1a">carrier</text>
  <line x1="62" y1="202" x2="112" y2="202" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="114" y="176" width="170" height="52" rx="4" fill="none" stroke="#4269d0" stroke-width="2"/>
  <text x="199" y="198" text-anchor="middle" fill="#4269d0">the same 24-band bank</text>
  <text x="199" y="215" text-anchor="middle" fill="#666666" font-size="10.5">constant 0 dB peak at any q</text>

  <!-- multipliers -->
  <line x1="284" y1="202" x2="336" y2="202" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <g stroke="#666666" stroke-width="1.4" fill="none">
    <circle cx="356" cy="164" r="11"/>
    <circle cx="356" cy="202" r="11"/>
    <circle cx="356" cy="240" r="11"/>
  </g>
  <text x="356" y="169" text-anchor="middle" fill="#1a1a1a" font-size="13">×</text>
  <text x="356" y="207" text-anchor="middle" fill="#1a1a1a" font-size="13">×</text>
  <text x="356" y="245" text-anchor="middle" fill="#1a1a1a" font-size="13">×</text>
  <text x="356" y="272" text-anchor="middle" fill="#666666" font-size="11">× 24, band-matched</text>

  <path d="M 406 108 L 406 140 L 356 140 L 356 153" fill="none" stroke="#b8890f" stroke-width="1.8" marker-end="url(#ab)"/>
  <text x="418" y="136" fill="#b8890f" font-size="10.5">band k's envelope gates band k's carrier — never audio itself</text>

  <line x1="367" y1="164" x2="420" y2="196" stroke="#666666" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="367" y1="202" x2="420" y2="202" stroke="#666666" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="367" y1="240" x2="420" y2="208" stroke="#666666" stroke-width="1.4" marker-end="url(#a)"/>
  <circle cx="438" cy="202" r="15" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="438" y="207" text-anchor="middle" fill="#1a1a1a" font-size="15">Σ</text>
  <line x1="453" y1="202" x2="478" y2="202" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="480" y="185" width="62" height="34" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="511" y="206" text-anchor="middle" fill="#1a1a1a">× gain</text>
  <line x1="542" y1="202" x2="568" y2="202" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="574" y="206" fill="#1a1a1a">y</text>

  <!-- consequences -->
  <text x="620" y="170" fill="#1a1a1a" font-size="11.5">the graph shape proves the pins:</text>
  <text x="620" y="186" fill="#666666" font-size="11">a silent carrier is silence (nothing to gate),</text>
  <text x="620" y="200" fill="#666666" font-size="11">gain is exactly linear (one multiply),</text>
  <text x="620" y="214" fill="#666666" font-size="11">a silent modulator decays to silence</text>
  <text x="620" y="228" fill="#666666" font-size="11">(the followers relax to zero).</text>

  <text x="16" y="292" fill="#666666" font-size="11">Both banks share coefficients (RBJ constant-peak biquads), so band k means the same frequencies on both sides — the multiply is honest.</text>
</svg>
