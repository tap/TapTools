<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 330" font-family="sans-serif" font-size="12.5">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#666666"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#b8890f"/>
    </marker>
  </defs>

  <text x="16" y="24" fill="#1a1a1a" font-weight="bold">uniformly-partitioned overlap-save — the frequency-domain delay line</text>

  <!-- input framing -->
  <text x="10" y="86" fill="#1a1a1a">in</text>
  <line x1="28" y1="82" x2="52" y2="82" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="54" y="60" width="150" height="44" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="129" y="78" text-anchor="middle" fill="#1a1a1a">frame [prev | new]</text>
  <text x="129" y="95" text-anchor="middle" fill="#666666" font-size="10.5">2B samples, hop B</text>
  <line x1="204" y1="82" x2="228" y2="82" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="230" y="65" width="56" height="34" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="258" y="86" text-anchor="middle" fill="#1a1a1a">FFT</text>
  <line x1="286" y1="82" x2="314" y2="82" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- FDL ring -->
  <rect x="316" y="46" width="330" height="72" rx="6" fill="none" stroke="#4269d0" stroke-width="2"/>
  <text x="481" y="66" text-anchor="middle" fill="#4269d0">frequency-domain delay line</text>
  <rect x="330" y="76" width="60" height="30" rx="3" fill="none" stroke="#4269d0" stroke-width="1.2"/>
  <text x="360" y="95" text-anchor="middle" fill="#666666" font-size="10.5">X_m</text>
  <rect x="398" y="76" width="60" height="30" rx="3" fill="none" stroke="#4269d0" stroke-width="1.2"/>
  <text x="428" y="95" text-anchor="middle" fill="#666666" font-size="10.5">X_m−1</text>
  <rect x="466" y="76" width="60" height="30" rx="3" fill="none" stroke="#4269d0" stroke-width="1.2"/>
  <text x="496" y="95" text-anchor="middle" fill="#666666" font-size="10.5">X_m−2</text>
  <text x="556" y="95" fill="#666666" font-size="12">…</text>
  <rect x="574" y="76" width="60" height="30" rx="3" fill="none" stroke="#4269d0" stroke-width="1.2"/>
  <text x="604" y="95" text-anchor="middle" fill="#666666" font-size="9.5">X_m−P+1</text>

  <!-- partition spectra + MAC -->
  <rect x="316" y="150" width="330" height="46" rx="6" fill="none" stroke="#b8890f" stroke-width="1.6"/>
  <text x="481" y="169" text-anchor="middle" fill="#b8890f">IR partition spectra H₀ … H_P−1</text>
  <text x="481" y="186" text-anchor="middle" fill="#666666" font-size="10.5">double-buffered — an IR swap is one atomic pointer flip</text>

  <line x1="360" y1="106" x2="360" y2="128" stroke="#666666" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="428" y1="106" x2="428" y2="128" stroke="#666666" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="496" y1="106" x2="496" y2="128" stroke="#666666" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="604" y1="106" x2="604" y2="128" stroke="#666666" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="360" y1="150" x2="360" y2="132" stroke="#b8890f" stroke-width="1.2" marker-end="url(#ab)"/>
  <line x1="428" y1="150" x2="428" y2="132" stroke="#b8890f" stroke-width="1.2" marker-end="url(#ab)"/>
  <line x1="496" y1="150" x2="496" y2="132" stroke="#b8890f" stroke-width="1.2" marker-end="url(#ab)"/>
  <line x1="604" y1="150" x2="604" y2="132" stroke="#b8890f" stroke-width="1.2" marker-end="url(#ab)"/>
  <text x="672" y="134" fill="#1a1a1a" font-size="12">Y = Σ H_j · X_m−j</text>
  <text x="672" y="150" fill="#666666" font-size="10.5">per-bin MAC — the only cost</text>
  <text x="672" y="163" fill="#666666" font-size="10.5">that grows with IR length;</text>
  <text x="672" y="176" fill="#666666" font-size="10.5">FFT cost is constant</text>

  <!-- output -->
  <path d="M 646 82 L 700 82" fill="none" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="702" y="65" width="60" height="34" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="732" y="86" text-anchor="middle" fill="#1a1a1a">IFFT</text>
  <line x1="762" y1="82" x2="790" y2="82" stroke="#666666" stroke-width="1.6" marker-end="url(#a)"/>
  <rect x="792" y="56" width="152" height="52" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <line x1="792" y1="82" x2="868" y2="82" stroke="#666666" stroke-width="0" />
  <rect x="796" y="62" width="70" height="40" fill="none" stroke="#ff725c" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="831" y="80" text-anchor="middle" fill="#ff725c" font-size="10">aliased half</text>
  <text x="831" y="93" text-anchor="middle" fill="#ff725c" font-size="10">discard</text>
  <rect x="872" y="62" width="68" height="40" fill="none" stroke="#3ca951" stroke-width="1.2"/>
  <text x="906" y="80" text-anchor="middle" fill="#3ca951" font-size="10">valid B</text>
  <text x="906" y="93" text-anchor="middle" fill="#3ca951" font-size="10">keep → y</text>

  <text x="16" y="236" fill="#666666" font-size="11">Overlap-save: convolve 2B samples circularly, keep only the clean second half — exactly B linear-convolution samples per block,</text>
  <text x="16" y="251" fill="#666666" font-size="11">latency exactly B. Measured against direct convolution: max difference 3×10⁻¹², identical at every block size.</text>
  <text x="16" y="278" fill="#1a1a1a" font-size="11" font-style="italic">There is no "character" in this engine — the room you loaded is the room you get.</text>
</svg>
