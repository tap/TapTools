<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 250" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#666666"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#ff725c"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#b8890f"/>
    </marker>
  </defs>

  <!-- oversampled region -->
  <rect x="252" y="30" width="470" height="196" rx="8" fill="none" stroke="#999999" stroke-dasharray="5 4"/>
  <text x="712" y="216" text-anchor="end" fill="#666666" font-size="11.5">runs at the oversampled rate (default 4×)</text>

  <!-- main path -->
  <text x="10" y="119" fill="#1a1a1a">x</text>
  <line x1="22" y1="115" x2="38" y2="115" stroke="#666666" stroke-width="1.6" marker-end="url(#arr)"/>
  <rect x="40" y="98" width="64" height="34" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="72" y="119" text-anchor="middle" fill="#1a1a1a">preamp</text>
  <line x1="104" y1="115" x2="122" y2="115" stroke="#666666" stroke-width="1.6" marker-end="url(#arr)"/>
  <rect x="124" y="98" width="88" height="34" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="168" y="112" text-anchor="middle" fill="#1a1a1a" font-size="12">body pre-EQ</text>
  <text x="168" y="126" text-anchor="middle" fill="#666666" font-size="11">(highpass)</text>
  <line x1="212" y1="115" x2="230" y2="115" stroke="#666666" stroke-width="1.6" marker-end="url(#arr)"/>
  <rect x="232" y="98" width="46" height="34" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="255" y="119" text-anchor="middle" fill="#1a1a1a">↑ 4×</text>
  <line x1="278" y1="115" x2="306" y2="115" stroke="#666666" stroke-width="1.6"/>
  <circle cx="310" cy="115" r="3.5" fill="#666666"/>
  <line x1="313" y1="115" x2="332" y2="115" stroke="#666666" stroke-width="1.6" marker-end="url(#arr)"/>
  <rect x="334" y="98" width="46" height="34" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="357" y="119" text-anchor="middle" fill="#1a1a1a">× G</text>
  <line x1="380" y1="115" x2="402" y2="115" stroke="#666666" stroke-width="1.6" marker-end="url(#arr)"/>
  <circle cx="420" cy="115" r="15" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="420" y="120" text-anchor="middle" fill="#1a1a1a" font-size="15">Σ</text>
  <text x="405" y="105" text-anchor="middle" fill="#666666" font-size="11">+</text>
  <text x="411" y="140" text-anchor="middle" fill="#ff725c" font-size="11">−</text>
  <line x1="435" y1="115" x2="458" y2="115" stroke="#666666" stroke-width="1.6" marker-end="url(#arr)"/>
  <rect x="460" y="96" width="106" height="38" rx="4" fill="none" stroke="#4269d0" stroke-width="2"/>
  <text x="513" y="112" text-anchor="middle" fill="#4269d0">shape(· + b)</text>
  <text x="513" y="127" text-anchor="middle" fill="#666666" font-size="11">− shape(b)</text>
  <line x1="566" y1="115" x2="596" y2="115" stroke="#666666" stroke-width="1.6"/>
  <circle cx="600" cy="115" r="3.5" fill="#666666"/>
  <text x="600" y="103" text-anchor="middle" fill="#666666" font-size="11.5">w</text>
  <line x1="603" y1="115" x2="625" y2="115" stroke="#666666" stroke-width="1.6" marker-end="url(#arr)"/>
  <circle cx="643" cy="115" r="15" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="643" y="120" text-anchor="middle" fill="#1a1a1a" font-size="15">Σ</text>
  <line x1="658" y1="115" x2="678" y2="115" stroke="#666666" stroke-width="1.6" marker-end="url(#arr)"/>
  <rect x="680" y="98" width="46" height="34" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="703" y="119" text-anchor="middle" fill="#1a1a1a">↓ 4×</text>
  <line x1="726" y1="115" x2="744" y2="115" stroke="#666666" stroke-width="1.6" marker-end="url(#arr)"/>
  <rect x="746" y="98" width="68" height="34" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="780" y="119" text-anchor="middle" fill="#1a1a1a" font-size="12">DC block</text>
  <line x1="814" y1="115" x2="832" y2="115" stroke="#666666" stroke-width="1.6" marker-end="url(#arr)"/>
  <rect x="834" y="98" width="92" height="34" rx="4" fill="none" stroke="#666666" stroke-width="1.4"/>
  <text x="880" y="112" text-anchor="middle" fill="#1a1a1a" font-size="12">body post-EQ</text>
  <text x="880" y="126" text-anchor="middle" fill="#666666" font-size="11">· makeup</text>
  <line x1="926" y1="115" x2="944" y2="115" stroke="#666666" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="950" y="119" fill="#1a1a1a">y</text>

  <!-- clean-through path -->
  <path d="M 310 111 L 310 55 L 643 55 L 643 96" fill="none" stroke="#b8890f" stroke-width="1.8" marker-end="url(#arr-amber)"/>
  <text x="477" y="48" text-anchor="middle" fill="#b8890f" font-size="11.5">unity clean path — the transfer never flattens</text>

  <!-- feedback path -->
  <path d="M 600 119 L 600 178 L 566 178" fill="none" stroke="#ff725c" stroke-width="1.8" marker-end="url(#arr-red)"/>
  <rect x="480" y="161" width="84" height="34" rx="4" fill="none" stroke="#ff725c" stroke-width="1.6"/>
  <text x="522" y="178" text-anchor="middle" fill="#ff725c" font-size="12">LP 660 Hz</text>
  <text x="522" y="191" text-anchor="middle" fill="#666666" font-size="10.5">(zero-delay)</text>
  <path d="M 480 178 L 420 178 L 420 134" fill="none" stroke="#ff725c" stroke-width="1.8" marker-end="url(#arr-red)"/>
  <text x="443" y="172" text-anchor="middle" fill="#ff725c" font-size="11.5">× g_fb</text>
  <text x="345" y="196" text-anchor="start" fill="#ff725c" font-size="11.5">negative LF feedback:</text>
  <text x="345" y="210" text-anchor="start" fill="#666666" font-size="11">bass gain pinned at G/(1+g_fb)</text>
</svg>
